services:
  asterisk:
    image: andrius/asterisk:stable
    container_name: asterisk4
    restart: unless-stopped
    # network_mode: host
    # NOTE: host networking is the only sane choice for SIP+RTP on Linux
    # because of the wide UDP range. On Windows/macOS Docker Desktop,
    # comment out `network_mode: host` and use the `ports:` block below.
    ports:
      - "5060:5060/udp"            # SIP
      - "5061:5061/tcp"            # SIP-TLS
      - "8088:8088/tcp"            # HTTP / WS
      - "8089:8089/tcp"            # HTTPS / WSS
      - "5038:5038/tcp"            # Asterisk Manager Interface
      - "30000-30200:30000-30200/udp"  # RTP media range (narrowed for Windows)

    volumes:
      # --- Core configs ---
      - ./asterisk_configs/ari.conf:/etc/asterisk/ari.conf
      - ./asterisk_configs/extensions.conf:/etc/asterisk/extensions.conf
      - ./asterisk_configs/http.conf:/etc/asterisk/http.conf
      - ./asterisk_configs/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk_configs/manager.conf:/etc/asterisk/manager.conf
      - ./asterisk_configs/rtp.conf:/etc/asterisk/rtp.conf
      # - ./asterisk_configs/logger.conf:/etc/asterisk/logger.conf
      # - ./asterisk_configs/voicemail.conf:/etc/asterisk/voicemail.conf

      # --- HTTP / WebRTC static assets + TLS ---
      - ./phone:/var/lib/asterisk/static-http/
      - ./ssl:/var/lib/asterisk/ssl/

      # --- Permission fix wrapper ---
      - ./fix-asterisk-permissions.sh:/init-permissions.sh

    entrypoint: ["/bin/bash", "/init-permissions.sh"]

    tty: true
    stdin_open: true
