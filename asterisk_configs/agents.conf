; =============================================================================
; agents.conf — chan_agent pool definitions
; -----------------------------------------------------------------------------
; Agents log in via the AgentLogin() dialplan app and are then referenced
; from queues.conf as `Agent:<id>`. Static PJSIP/<ext> queue members do NOT
; require any entry here — this file is only needed for roaming agents
; (login/logoff from any phone).
;
; Original Asterisk sample is preserved as agents.conf.sample.
; =============================================================================

[general]

; -----------------------------------------------------------------------------
; Shared template for all agents
; -----------------------------------------------------------------------------
[agent-defaults](!)
ackcall          = no
acceptdtmf       = #
autologoff       = 30
wrapuptime       = 5000
musiconhold      = default
recordagentcalls = yes
custom_beep      = beep

; -----------------------------------------------------------------------------
; Agent pool
; -----------------------------------------------------------------------------
[1001](agent-defaults)
fullname = Agent 1001

[1002](agent-defaults)
fullname = Agent 1002

[1003](agent-defaults)
fullname = Agent 1003
