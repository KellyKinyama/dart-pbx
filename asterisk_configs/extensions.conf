; Dialplan for calls arriving from the dart-pbx proxy.
; Extend as needed for your environment (queues, voicemail, IVR, etc).
;
; andrius/asterisk:stable ships without sound packs, so we use built-in
; tone generation (Playtones) for the demo. To play actual prompts,
; install the asterisk-core-sounds package or mount a sounds volume
; into /var/lib/asterisk/sounds/.

[from-pbx]
exten => _X.,1,NoOp(Call from dart-pbx for ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 ;same => n,Wait(1)
 ;same => n,Playtones(ring)
 ;same => n,Wait(8)
 ;same => n,StopPlaytones()
 same => n,Hangup()

; Echo test for quick sanity checks: dial 600 from a registered phone.
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Call-center queues — dial 8000 (support) or 8001 (sales)
; ---------------------------------------------------------------------------
exten => 8000,1,NoOp(Entering support queue)
 ;same => n,Answer()
 same => n,Queue(support,t,,,300)
 same => n,Hangup()

exten => 8001,1,NoOp(Entering sales queue)
 ;same => n,Answer()
 same => n,Queue(sales,t,,,300)
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Fully-dynamic agent login / logoff / pause feature codes
;
;   8500 <queue>  — log this phone into <queue> (default: support)
;   8501 <queue>  — log this phone out of <queue> (default: support)
;   8502          — toggle pause across ALL queues this phone is in
;
; The queue name is taken from the dialed digits after the feature code
; (e.g. dial 8500sales). If omitted, defaults to "support".
; CALLERID(num) is the extension of the phone making the call, so the
; agent is registered as PJSIP/<their-extension>.
; ---------------------------------------------------------------------------
exten => _8500.,1,NoOp(Login ${CALLERID(num)} into queue ${EXTEN:4})
 same => n,Answer()
 same => n,Set(QNAME=${IF($["${EXTEN:4}" = ""]?support:${EXTEN:4})})
 same => n,AddQueueMember(${QNAME},PJSIP/${CALLERID(num)},0,,${CALLERID(name)})
 same => n,Playback(agent-loginok)
 same => n,Hangup()

exten => _8501.,1,NoOp(Logoff ${CALLERID(num)} from queue ${EXTEN:4})
 same => n,Answer()
 same => n,Set(QNAME=${IF($["${EXTEN:4}" = ""]?support:${EXTEN:4})})
 same => n,RemoveQueueMember(${QNAME},PJSIP/${CALLERID(num)})
 same => n,Playback(agent-loggedoff)
 same => n,Hangup()

exten => 8500,1,Goto(_8500.,1)
exten => 8501,1,Goto(_8501.,1)

exten => 8502,1,NoOp(Toggle pause for PJSIP/${CALLERID(num)})
 same => n,Answer()
 same => n,GotoIf($["${QUEUE_MEMBER(,paused,PJSIP/${CALLERID(num)})}" = "1"]?unpause:pause)
 same => n(pause),PauseQueueMember(,PJSIP/${CALLERID(num)})
 same => n,Playback(beep)
 same => n,Hangup()
 same => n(unpause),UnpauseQueueMember(,PJSIP/${CALLERID(num)})
 same => n,Playback(beep&beep)
 same => n,Hangup()
