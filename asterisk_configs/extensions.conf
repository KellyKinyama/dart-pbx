; Dialplan for calls arriving from the dart-pbx proxy.
; Extend as needed for your environment (queues, voicemail, IVR, etc).
;
; andrius/asterisk:stable ships without sound packs, so we use built-in
; tone generation (Playtones) for the demo. To play actual prompts,
; install the asterisk-core-sounds package or mount a sounds volume
; into /var/lib/asterisk/sounds/.

[from-pbx]
exten => _X.,1,NoOp(Call from dart-pbx for ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 ;same => n,Wait(1)
 ;same => n,Playtones(ring)
 ;same => n,Wait(8)
 ;same => n,StopPlaytones()
 same => n,Hangup()

; Echo test for quick sanity checks: dial 600 from a registered phone.
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()
