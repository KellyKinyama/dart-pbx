; =============================================================================
; queues.conf — dart-pbx call-center queues
; -----------------------------------------------------------------------------
; Two queues are defined:
;   [support] — first-line support, ringall strategy
;   [sales]   — sales line, round-robin with memory
;
; Members are the PJSIP endpoints declared in pjsip.conf (7000, 7001).
; Add 6001/6002 once those endpoints exist, or register them dynamically
; via AddQueueMember() from the dialplan / AMI / ARI.
;
; The original Asterisk sample is preserved as queues.conf.sample.
; =============================================================================

[general]
persistentmembers       = yes
autofill                = yes
monitor-type            = MixMonitor
shared_lastcall         = yes
log_membername_as_agent = yes

; -----------------------------------------------------------------------------
; Reusable defaults via template
; -----------------------------------------------------------------------------
[queue-defaults](!)
musicclass                  = default
strategy                    = ringall
timeout                     = 20
retry                       = 2
wrapuptime                  = 10
maxlen                      = 0
servicelevel                = 60
weight                      = 0
ringinuse                   = no
autopause                   = yes
autopausebusy               = yes
autopauseunavail            = yes
autopausedelay              = 60
joinempty                   = paused,invalid
leavewhenempty              = no
reportholdtime              = no
announce-frequency          = 30
min-announce-frequency      = 15
periodic-announce-frequency = 60
announce-holdtime           = once
announce-position           = yes
announce-position-limit     = 5
announce-round-seconds      = 10
setinterfacevar             = yes
setqueueentryvar            = yes
setqueuevar                 = yes
defaultrule                 = default-rule
monitor-format              = wav

; -----------------------------------------------------------------------------
; [support] — first-line support
;
; NO static `member =>` lines: this queue is fully dynamic. Agents join via
;   AddQueueMember(support,PJSIP/<ext>)   — feature code 8500 in extensions.conf
; and leave via
;   RemoveQueueMember(support,PJSIP/<ext>) — feature code 8501
; Membership is persisted in astdb (persistentmembers=yes in [general]) so
; agents stay logged in across Asterisk restarts.
; -----------------------------------------------------------------------------
[support](queue-defaults)
strategy = ringall

; -----------------------------------------------------------------------------
; [sales] — sales / outbound team (fully dynamic, see notes above)
; -----------------------------------------------------------------------------
[sales](queue-defaults)
strategy   = rrmemory
wrapuptime = 20
