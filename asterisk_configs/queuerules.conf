; =============================================================================
; queuerules.conf — penalty escalation rules referenced from queues.conf
; -----------------------------------------------------------------------------
; Syntax:
;   penaltychange => <seconds>,<max-penalty>[,<min-penalty>[,<raise>]]
; A '+' or '-' prefix means relative change.
;
; Original Asterisk sample is preserved as queuerules.conf.sample.
; =============================================================================

[general]
; realtime_rules = no

; Default rule used by queues that set defaultrule = default-rule.
; Starts ringing only penalty-0 agents, widens to penalty 1 after 30s,
; then to penalty 2 after 60s — useful for tier-1/tier-2/overflow groups.
[default-rule]
penaltychange => 30,1
penaltychange => 60,2
penaltychange => 120,3

; Aggressive escalation for sales — open to all tiers within a minute.
[sales-rule]
penaltychange => 15,1
penaltychange => 30,2
penaltychange => 45,5

; VIP rule — keep tier-0 only, never widen.
[vip-rule]
; (no penaltychange entries — penalties never relax)
