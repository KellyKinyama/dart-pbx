; Minimal PJSIP config for the dart-pbx call-center demo.
; Phones (6001/6002/7000) register to dart-pbx (udp:5070), NOT to Asterisk.
; dart-pbx forwards non-queue INVITEs to Asterisk via the trusted [dart-pbx]
; identify below. Keep credentials in sync with .env (SIP_USERS).

[global]
type=global
endpoint_identifier_order=ip,username,anonymous

;------------------------------------------------------------------------------
; UDP transport — bound to the host's 5060/udp because compose uses host networking.
;------------------------------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;------------------------------------------------------------------------------
; Trusted peer: the dart-pbx proxy. No auth — IP-based identify.
; Adjust `match=` to wherever dart-pbx runs (host loopback by default).
;------------------------------------------------------------------------------
[dart-pbx]
type=endpoint
context=from-pbx
disallow=all
allow=ulaw,alaw
direct_media=no
trust_id_inbound=yes
; Note: deliberately no `aors=` line. dart-pbx is a peer / trunk, not a
; registrar client. Without `aors=` Asterisk won't try to look up an AOR
; on incoming REGISTERs from this endpoint, so stray REGISTERs from the
; host (port 5060) are silently rejected instead of generating the
; "AOR '' not found" warning.

[dart-pbx]
type=identify
endpoint=dart-pbx
match=127.0.0.1
