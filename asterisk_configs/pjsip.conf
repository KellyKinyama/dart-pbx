; Minimal PJSIP config for the dart-pbx call-center demo.
; Phones (6001/6002/7000) register to dart-pbx (udp:5070), NOT to Asterisk.
; dart-pbx forwards non-queue INVITEs to Asterisk via the trusted [dart-pbx]
; identify below. Keep credentials in sync with .env (SIP_USERS).

[global]
type=global
;external_signaling_address=10.6.50.224
;external_media_address=10.6.50.224

;------------------------------------------------------------------------------
; Transports — UDP/TCP/TLS/WSS. Compose uses host networking so all bind 0.0.0.0
;------------------------------------------------------------------------------
[udp_transport]
type=transport
protocol=udp
bind=0.0.0.0
tos=af42
cos=3
;external_signaling_address=10.6.50.224
;external_media_address=10.6.50.224
external_signaling_address=127.0.0.1
external_media_address=127.0.0.1
;local_net=172.18.0.0/16

[wss_transport]
type=transport
protocol=wss
bind=0.0.0.0
;external_media_address=10.6.50.224
;external_signaling_address=10.6.50.224
local_net=172.18.0.0/16

[tcp_transport]
type=transport
protocol=tcp
bind=0.0.0.0

[tls_transport]
type=transport
protocol=tls
bind=0.0.0.0
cert_file=/var/lib/asterisk/ssl/cert.pem
priv_key_file=/var/lib/asterisk/ssl/key.pem
;cipher=ADH-AES256-SHA,ADH-AES128-SHA
;method=tlsv1
;tcp_keepalive_enable=yes        ; Enable TCP keepalive (yes/no)
;tcp_keepalive_idle_time=30      ; Time in seconds the connection needs to remain idle before TCP starts sending keepalive probes
;tcp_keepalive_interval_time=10  ; The time in seconds between individual keepalive probes
;tcp_keepalive_probe_count=5     ; The maximum number of keepalive probes TCP should send before dropping the connection

;------------------------------------------------------------------------------
; Trusted peer: the dart-pbx proxy. No auth — IP-based identify.
; Adjust `match=` to wherever dart-pbx runs (host loopback by default).
;------------------------------------------------------------------------------
;[dart-pbx]
;type=endpoint
;context=from-pbx
;disallow=all
;allow=ulaw,alaw
;direct_media=no
;trust_id_inbound=yes
; Note: deliberately no `aors=` line. dart-pbx is a peer / trunk, not a
; registrar client. Without `aors=` Asterisk won't try to look up an AOR
; on incoming REGISTERs from this endpoint, so stray REGISTERs from the
; host (port 5060) are silently rejected instead of generating the
; "AOR '' not found" warning.

;[dart-pbx]
;type=aor
;endpoint=dart-pbx
;match=127.0.0.1

;[6001]
;type=endpoint
;context=from-pbx
;disallow=all
;allow=ulaw,alaw
;direct_media=no
;trust_id_inbound=yes
; Note: deliberately no `aors=` line. dart-pbx is a peer / trunk, not a
; registrar client. Without `aors=` Asterisk won't try to look up an AOR
; on incoming REGISTERs from this endpoint, so stray REGISTERs from the
; host (port 5060) are silently rejected instead of generating the
; "AOR '' not found" warning.

;[6001]
;type=identify
;endpoint=dart-pbx
;match=127.0.0.1

[7000]
type=endpoint
context=from-pbx
disallow=all
allow=alaw
auth=7000
aors=7000
[7000]
type=auth
auth_type=userpass
password=7000
username=7000
[7000]
type=aor
max_contacts=1
